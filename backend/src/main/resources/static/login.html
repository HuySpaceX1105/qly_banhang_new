<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-8 text-white text-center">
            <h2 class="text-3xl font-bold">Đăng nhập</h2>
            <p class="mt-2 opacity-90">Chào mừng bạn trở lại!</p>
        </div>

        <div class="p-8">
            <form id="loginForm">
                <!-- Username -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input id="username" type="text" 
                               class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:border-indigo-500"
                               placeholder="Nhập tên đăng nhập" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" type="password" 
                               class="w-full pl-11 pr-12 py-3 border border-gray-300 rounded-xl focus:border-indigo-500"
                               placeholder="Nhập mật khẩu" required>
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 text-gray-400">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMsg" class="hidden text-red-600 text-sm text-center mb-4"></div>

                <button type="button" id="loginBtn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2">
                    <span id="btnText">Đăng nhập</span>
                    <i id="spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // ==================== DEBUG VERSION ====================
        const loginBtn = document.getElementById("loginBtn");
        const btnText = document.getElementById("btnText");
        const spinner = document.getElementById("spinner");
        const errorMsg = document.getElementById("errorMsg");
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        // Toggle password
        togglePassword.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passwordInput.type = "password";
                eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
            }
        });

        // Xử lý click nút Login
        loginBtn.addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            // === DEBUG LOG ===
            console.log("=== DEBUG LOGIN START ===");
            console.log("Username:", username);
            console.log("Password length:", password.length);
            console.log("Payload:", JSON.stringify({ username, password }));

            // Loading
            loginBtn.disabled = true;
            btnText.textContent = "Đang đăng nhập...";
            spinner.classList.remove("hidden");
            errorMsg.classList.add("hidden");

            try {
                const payload = { username: 'admin', password: '123456' };
                fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Thêm header xác thực nếu cần, ví dụ: 'Authorization': 'Bearer token'
                },
                body: JSON.stringify(payload)
                })
                .then(response => {
                if (!response.ok) {
                    throw new Error('Đăng nhập thất bại');
                }
                return response.json();
                })
                .then(data => {
                console.log('Thành công:', data);
                })
                .catch(error => {
                console.error('Lỗi:', error);
                });

            } catch (err) {
                console.error("Lỗi:", err);
                errorMsg.textContent = err.message;
                errorMsg.classList.remove("hidden");
            } finally {
                loginBtn.disabled = false;
                btnText.textContent = "Đăng nhập";
                spinner.classList.add("hidden");
            }
        });
    </script>
</body>
</html>
