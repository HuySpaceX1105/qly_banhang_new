<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; }
        .container {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .info {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Tài khoản đã được tạo</div>

    <p>Xin chào <b th:text="${username}"></b>,</p>

    <p>Tài khoản của bạn đã được tạo thành công.</p>

    <div class="info">
        <p><b>Username:</b> <span th:text="${username}"></span></p>
        <p><b>Password:</b> <span th:text="${password}"></span></p>
    </div>

    <p>Vui lòng đăng nhập và đổi mật khẩu ngay.</p>
</div>

</body>
</html>
